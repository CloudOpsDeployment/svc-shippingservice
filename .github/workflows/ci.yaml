name: CI — Build and Push to ECR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    uses: CloudOpsDeployment/.github/.github/workflows/agnostic-docker-build.yaml@main
    with:
      service_name: "shippingservice"
      ecr_registry: ${{ vars.ECR_REGISTRY }}
    secrets:
      aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
